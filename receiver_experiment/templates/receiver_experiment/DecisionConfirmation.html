{{ block title }}Receiver Experiment{{ endblock }}

{{ block styles }}
<link rel="stylesheet" href="{{ static 'receiver_experiment/experiment.css' }}">
{{ endblock }}

{{ block content }}
<main class="app-shell">
    <section class="experiment-card">
        <div class="progress-track" aria-hidden="true">
            <div class="progress-fill" style="width: {{ progress_percent }}%;"></div>
        </div>

        <div class="screen-content">
            <span class="eyebrow">Decision Confirmation</span>
            <h1>You selected: {{ player.guess }}</h1>
            <div class="choice-summary">Press Confirm to continue.</div>
        </div>

        <div class="action-row">
            <button class="otree-btn-next btn-primary">Confirm</button>
        </div>
    </section>
</main>
{{ endblock }}
