{{ block title }}Receiver Experiment{{ endblock }}

{{ block styles }}
<link rel="stylesheet" href="{{ static 'receiver_experiment/experiment.css' }}">
{{ endblock }}

{{ block content }}
<main class="app-shell">
    <section class="experiment-card">
        <div class="progress-track" aria-hidden="true">
            <div class="progress-fill" style="width: {{ progress_percent }}%;"></div>
        </div>

        <div class="screen-content">
            <h1>Please complete the final questionnaire.</h1>
            <div class="decision-panel demographics-panel">
                {{ formfields }}
            </div>
        </div>

        <div class="action-row">
            <button class="otree-btn-next btn-primary">Submit</button>
        </div>
    </section>
</main>
{{ endblock }}
