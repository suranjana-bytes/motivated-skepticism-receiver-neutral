{{ block title }}Receiver Experiment{{ endblock }}

{{ block styles }}
<link rel="stylesheet" href="{{ static 'receiver_experiment/experiment.css' }}?v=iq-fit-6">
{{ endblock }}

{{ block content }}
<main class="app-shell iq-app-shell">
    <section class="experiment-card iq-card">
        <div class="iq-timer iq-timer-corner" data-remaining="{{ remaining_seconds }}">
            <span class="iq-timer-label">Time remaining</span>
            <span class="iq-timer-value">10:00</span>
        </div>

        <div class="progress-track" aria-hidden="true">
            <div class="progress-fill" style="width: {{ progress_percent }}%;"></div>
        </div>

        <div class="screen-content iq-screen-content">
            <h1 class="iq-heading">Question {{ item.item_number }} of 10</h1>
            <div class="matrix-panel raven-panel">
                <img class="raven-stem" src="{{ static item.stem_path }}" alt="{{ item.question_id }} matrix">
            </div>

            <div class="decision-panel iq-options">
                {{ for option in item.options }}
                    <label class="iq-option">
                        <input type="radio" name="{{ form_field_name }}" value="{{ option.value }}">
                        <span class="iq-option-card">
                            <span class="iq-option-head">
                                <span class="iq-option-letter">{{ option.label }}</span>
                                <span class="iq-option-name">Option {{ option.label }}</span>
                            </span>
                            <img class="iq-option-image" src="{{ static option.image_path }}" alt="{{ item.question_id }} {{ option.label }}">
                        </span>
                    </label>
                {{ endfor }}
            </div>
        </div>

        <div class="action-row">
            <button class="otree-btn-next btn-primary">Next</button>
        </div>
    </section>
</main>

<script>
    (() => {
        const timer = document.querySelector('.iq-timer');
        if (!timer) return;
        const value = timer.querySelector('.iq-timer-value');
        let remaining = Number(timer.dataset.remaining || 0);

        const render = () => {
            const minutes = Math.floor(remaining / 60);
            const seconds = remaining % 60;
            value.textContent = `${minutes}:${String(seconds).padStart(2, '0')}`;
        };

        render();
        const interval = setInterval(() => {
            if (remaining <= 0) {
                clearInterval(interval);
                return;
            }
            remaining -= 1;
            render();
        }, 1000);
    })();
</script>
{{ endblock }}
